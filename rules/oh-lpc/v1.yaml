summary: |
  3,000 supervised practice hours over at least 24 months (max 1,500 per
  12-month period), with 1,500+ face-to-face client contact hours involving
  MED diagnosis/treatment. Supervision ratio: 1 hour per 20 hours of work
  (~150 hours total). No fixed individual-to-group ratio required. Supervisor
  must be an LPCC with the Board's training supervision designation. No
  pre-registration/contract filing required — Ohio uses milestone evaluations
  at 1,500 and 3,000 hours.

