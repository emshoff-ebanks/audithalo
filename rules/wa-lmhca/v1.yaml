page_content:
  intro: |
    The Licensed Mental Health Counselor Associate (LMHCA) is Washington State's
    pre-independent counseling credential for mental health professionals working
    toward full LMHC licensure. LMHCAs must practice under supervision and cannot
    provide independent mental health counseling for a fee. To earn the LMHC,
    candidates must complete 3,000 hours of supervised postgraduate experience
    (including 1,200+ direct client contact hours) over at least 36 months, with
    a minimum of 100 hours of immediate supervision.

    Washington uses a cadence-based supervision model: 1 hour of supervision for
    every 80 hours of clinical practice. The state defines "immediate supervision"
    as a meeting with no more than 2 candidates (not strictly 1-on-1). Group
    supervision (up to 6 candidates) does not count toward the 100-hour minimum.
    AuditHalo tracks the cadence ratio continuously and alerts your team when any
    supervisee falls behind.

  supervisor_qualifications:
    - "Must be a licensed LMHC or equally qualified practitioner: LMFT, LICSW, Licensed Psychologist, Licensed Psychiatrist, or Licensed Psychiatric Nurse Practitioner (WAC 246-809-234, WAC 246-809-210(4))"
    - "Must be licensed without restrictions and in good standing for the previous 2 years (WAC 246-809-234(1))"
    - "Must have 15+ clock hours of clinical supervision training AND 25 hours of supervision experience (WAC 246-809-234(4))"
    - "Cannot be a blood/legal relative, cohabitant, peer, or former therapist (within past 2 years) of the candidate (WAC 246-809-234(2))"
    - "Must provide a signed declaration on DOH form to the candidate before supervision begins (WAC 246-809-234(3))"

  key_warnings:
    - "The 100-hour supervision minimum must be 'immediate' supervision (1 supervisor with no more than 2 candidates) — group supervision (3-6 candidates) does NOT count toward this minimum"
    - "Supervisor must provide a signed declaration to the candidate before supervision begins — this is the pre-registration requirement (WAC 246-809-234(3))"
    - "The experience must span at least 36 months (3 years) — this is longer than most states' minimums"
    - "CACREP graduates receive credit for 500 practice hours and 50 supervision hours (WAC 246-809-230(4))"
    - "LMHCAs may not provide independent mental health counseling for a fee"
    - "6 hours of suicide prevention/intervention training required at least once every 6 years (RCW 43.70.442)"
    - "Candidates must periodically submit supervision hours documentation to DOH (WAC 246-809-020(3)(c))"
    - "Effective Oct 1, 2025: applicants may practice under supervision for up to 120 days while their LMHCA application is pending"

  faq:
    - q: "How many supervised hours does an LMHCA need in Washington?"
      a: "3,000 hours of supervised postgraduate experience over at least 36 months, including at least 1,200 direct client contact hours and at least 100 hours of immediate supervision (supervisor with no more than 2 candidates). CACREP graduates receive credit for 500 practice hours and 50 supervision hours."
    - q: "What qualifies as an approved supervisor in Washington?"
      a: "Your supervisor must be a licensed LMHC, LMFT, LICSW, Licensed Psychologist, Licensed Psychiatrist, or Licensed Psychiatric Nurse Practitioner — licensed without restrictions and in good standing for the past 2 years. They must have 15+ hours of clinical supervision training and 25 hours of supervision experience."
    - q: "How often must supervision occur in Washington?"
      a: "At least 1 hour of supervision for every 80 hours of clinical practice time. This is a ratio-based cadence, not a fixed weekly requirement."
    - q: "Can supervision be done virtually in Washington?"
      a: "Yes. Both immediate supervision and group supervision definitions explicitly allow face-to-face or virtual meetings (WAC 246-809-210(5)-(6)). No location restriction is stated."
    - q: "Does AuditHalo generate the documentation Washington requires?"
      a: "AuditHalo generates tamper-evident evidence packages for each supervision session with date, duration, session type, supervisor credentials, and dual signatures. The system supports periodic submission of supervision hours documentation to DOH as required by WAC 246-809-020(3)(c)."

notes:
  - "Washington's 'immediate supervision' allows up to 2 candidates (not strictly 1-on-1). AuditHalo treats sessions with 2 candidates as satisfying the immediate supervision requirement."
  - "Group supervision (3-6 candidates) does NOT count toward the 100-hour immediate supervision minimum. It may count toward overall experience documentation but this should be verified with DOH."
  - "The LMHCA credential lifespan is uncertain: rule history cites 6 renewals (6 years), but current DOH FAQ says unlimited renewals. The 72-month max_duration is based on the 6-renewal historical rule."
  - "SUDP practitioners with 3+ years of the previous 10 in practice get a reduced total of 2,700 hours (WAC 246-809-230(2))."
  - "WAC 246-809-020 supervision cadence (1:80 ratio) originated as an emergency rule in 2025. Verify current enforcement status before go-live."
