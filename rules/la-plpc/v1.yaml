summary: |
  3,000 supervised practice hours over 2-6 years, including 1,900+ direct
  counseling hours and 1,000+ indirect hours. 100 face-to-face supervision
  hours total, of which at least 50 must be individual. Cadence: 1 hour of
  supervision per 20 direct client contact hours. Supervisor must hold the
  LPC-S (LPC-Supervisor) designation from the LA LPC Board. Supervision plan
  must be filed and approved by the Board BEFORE hours begin counting.
  Retroactive hours are not permitted.

