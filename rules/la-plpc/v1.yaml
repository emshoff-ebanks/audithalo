# Louisiana PLPC — Provisional Licensed Professional Counselor
# Source: LAC 46:LX (Title 46, Part LX) — Professional Counselors (Rules dated 12.21.21)
# Statute: R.S. 37:1101–1123 — Louisiana Mental Health Counselor Licensing Act
