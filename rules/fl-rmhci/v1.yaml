# Florida RMHCI — Registered Mental Health Counselor Intern
# PRELIMINARY — drafted from public-source recall without live verification.
# Re-verify against live F.S. 491 + F.A.C. 64B4 before relying on this in production.

jurisdiction: FL
license_code: RMHCI
license_name: Registered Mental Health Counselor Intern
issuing_board: Florida Board of Clinical Social Work, Marriage and Family Therapy, and Mental Health Counseling
version: 1

summary: |
  1,500 hours of supervised post-master's experience (including ≥1,000 hours of
  face-to-face psychotherapy) earned over at least 100 weeks. At least 100 hours
  of supervision, with at least half being individual. Supervision must be
  delivered by a Florida Qualified Supervisor (LMHC/LMFT/LCSW/Licensed
  Psychologist with 5+ years post-licensure and a 15-hour supervisor course).
  Intern registration is valid for 60 months and IS NOT RENEWABLE — the binding
  cap on the supervision window.

