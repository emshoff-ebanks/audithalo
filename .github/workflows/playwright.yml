name: Playwright E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  forbidden-patterns:
    name: Forbidden-pattern grep gate
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Run grep gate
        run: bash ci/forbidden-patterns.sh

  e2e:
    name: Run Playwright tests
    needs: forbidden-patterns
    timeout-minutes: 15
    runs-on: ubuntu-latest
    env:
      # Default to prod URL. Override per-workflow if you stand up a
      # staging deployment or run against a local build in CI.
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      E2E_ORG_ID: ${{ secrets.E2E_ORG_ID }}
      E2E_HR_ADMIN_EMAIL: ${{ secrets.E2E_HR_ADMIN_EMAIL }}
      E2E_HR_ADMIN_PASSWORD: ${{ secrets.E2E_HR_ADMIN_PASSWORD }}
      E2E_SUPERVISOR_EMAIL: ${{ secrets.E2E_SUPERVISOR_EMAIL }}
      E2E_SUPERVISOR_PASSWORD: ${{ secrets.E2E_SUPERVISOR_PASSWORD }}
      E2E_SUPERVISEE_EMAIL: ${{ secrets.E2E_SUPERVISEE_EMAIL }}
      E2E_SUPERVISEE_PASSWORD: ${{ secrets.E2E_SUPERVISEE_PASSWORD }}
      E2E_EXECUTIVE_EMAIL: ${{ secrets.E2E_EXECUTIVE_EMAIL }}
      E2E_EXECUTIVE_PASSWORD: ${{ secrets.E2E_EXECUTIVE_PASSWORD }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
